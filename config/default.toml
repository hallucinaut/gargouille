# ╔══════════════════════════════════════════════════╗
# ║  Gargouille WAF — Default Configuration          ║
# ╚══════════════════════════════════════════════════╝

[server]
listen_addr = "0.0.0.0"
listen_port = 8443                    # HTTPS listener
reverse_proxy_port = 8080             # HTTP admin/status
upstream_host = "127.0.0.1"           # Backend origin
upstream_port = 3000                  # Backend port
tls_enabled = true
tls_cert = "certs/server.crt"
tls_key = "certs/server.key"

[waf]
# Action when threat detected: block, challenge, log, rate_limit, scan
default_action = "Block"
# Maximum request body size (bytes) — 10MB
max_body_size = 10485760
# Timeout for upstream connections (ms)
upstream_timeout_ms = 30000
# Enable strict HTTP compliance
strict_mode = true
# Path-based allowlist (deny-by-default mode)
# When enabled, only requests whose path matches an entry in allowed_paths are forwarded.
# Admin endpoints (/admin/*) and metrics (/metrics*) are always accessible regardless.
[waf.allowlist]
allowed = false
allowed_paths = []  # e.g., ["/test/toto", "/api/login"]

[scoring]
# Threshold to trigger action (0-100). Higher = more sensitive
threat_threshold = 50
# Points deducted per rule match
sql_injection_weight = 30
xss_weight = 25
command_injection_weight = 35
lfi_rfi_weight = 30
ssti_weight = 30
ssrf_weight = 25
deserialization_weight = 35
header_injection_weight = 20
path_traversal_weight = 20
protocol_violation_weight = 15
anomaly_score = 10

[rate_limiting]
# Enable sliding window rate limiter
enabled = true
# Requests per window
requests_per_window = 100
# Window size in seconds
window_seconds = 60
# Per-IP burst allowance
burst_allowance = 20
# Endpoint-specific limits (path -> requests/minute)
endpoint_limits = { "/api/login" = 10, "/api/register" = 5, "/admin" = 30 }

[rate_limiting.block]
duration_minutes = 60
auto_unblock = true

[geo_ip]
# Enable IP reputation & geolocation blocking
enabled = true
db_path = "database/GeoLite2-Country.mmdb"
# Block IPs from high-risk countries (ISO 3166-1 alpha-2)
blocked_countries = []
# Minimum reputation score to allow (0-100, higher = better)
min_reputation_score = 40

[blocklist]
enabled = true
database_path = "database/gargouille.db"

[logging]
level = "info"                    # trace, debug, info, warn, error
format = "json"                   # json, pretty
log_file = "logs/gargouille.log"
# Log blocked requests with full details
log_blocked = true
# Enable request sampling for high-traffic (1.0 = all, 0.1 = 10%)
sample_rate = 1.0

[metrics]
enabled = true
port = 9090                       # Prometheus metrics endpoint
path = "/metrics"

[tls_inspector]
# TLS inspection for encrypted traffic analysis
enabled = false
deep_packet_inspection = false
min_tls_version = "TLS_1_2"       # TLS_1_2, TLS_1_3
cipher_suites_blocked = [
    "TLS_RSA_WITH_RC4_128_SHA",
    "TLS_RSA_WITH_3DES_EDE_CBC_SHA",
]

[bot_protection]
enabled = true
block_bad_bots = true
captcha_threshold = 5             # challenges before CAPTCHA
challenge_type = "js_challenge"   # js_challenge, captcha, honeypot

[response_headers]
# Security headers added to every response
x_frame_options = "DENY"
x_content_type_options = "nosniff"
x_xss_protection = "0"            # Modern browsers use CSP instead
content_security_policy = "default-src 'self'; script-src 'self'"
referrer_policy = "strict-origin-when-cross-origin"
permissions_policy = "camera=(), microphone=(), geolocation=()"
strict_transport_security = "max-age=31536000; includeSubDomains"
